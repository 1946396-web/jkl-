<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub Pro - Ultimate Gaming & Media Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🎮</span>
                <h1>GameHub Pro</h1>
            </div>
            <div class="header-info">
                <span class="game-count">📊 <span id="gameCount">0</span> Games & Apps</span>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Search games, apps, music...">
            <button id="searchBtn">Search</button>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="games">🎮 Games</button>
            <button class="filter-btn" data-filter="streaming">📺 Streaming</button>
            <button class="filter-btn" data-filter="music">🎵 Music</button>
            <button class="filter-btn" data-filter="social">👥 Social</button>
            <button class="filter-btn" data-filter="tools">🛠️ Tools</button>
            <button class="filter-btn" data-filter="favorites">❤️ Favorites</button>
        </div>

        <!-- Content Grid -->
        <div class="content-grid" id="contentGrid"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-header">
                <div class="modal-image" id="modalImage">🎮</div>
                <div class="modal-info">
                    <h2 id="modalTitle">Game Title</h2>
                    <p id="modalDescription">Description goes here</p>
                </div>
            </div>
            <div class="modal-stats">
                <span>⭐ Rating: <strong id="modalRating">4.5</strong></span>
                <span>👥 Plays: <strong id="modalPlays">1M</strong></span>
                <span>🏷️ Type: <strong id="modalCategory">Games</strong></span>
            </div>
            <div class="modal-actions">
                <a id="playBtn" href="#" target="_blank" class="btn btn-primary">▶️ Play Now</a>
                <button id="favBtn" class="btn btn-secondary">❤️ Add to Favorites</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
